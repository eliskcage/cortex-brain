<VirtualHost *:80>
    ServerName cortex.shortfactory.shop
    DocumentRoot /var/www/cortex.shortfactory.shop

    <Directory /var/www/cortex.shortfactory.shop>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Direct proxy to cortex brain service — no Cloudflare in the way
    ProxyPreserveHost On
    ProxyPass /api/ http://127.0.0.1:8643/api/
    ProxyPassReverse /api/ http://127.0.0.1:8643/api/

    # CORS headers for direct access
    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Allow-Methods "GET, POST, OPTIONS"
    Header always set Access-Control-Allow-Headers "Content-Type"
    Header always set Cache-Control "no-store"

    ErrorLog ${APACHE_LOG_DIR}/cortex-error.log
    CustomLog ${APACHE_LOG_DIR}/cortex-access.log combined
</VirtualHost>
