<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName shortfactory.shop
    ServerAlias www.shortfactory.shop
    DocumentRoot /var/www/shortfactory.shop

    <Directory /var/www/shortfactory.shop>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/shortfactory-error.log
    CustomLog ${APACHE_LOG_DIR}/shortfactory-access.log combined

    # Proxy for Cortex Brain API
    ProxyPreserveHost On
    ProxyPass /api/card http://127.0.0.1:3141/card
    ProxyPassReverse /api/card http://127.0.0.1:3141/card
    ProxyPass /api/card-health http://127.0.0.1:3141/health
    ProxyPassReverse /api/card-health http://127.0.0.1:3141/health
    ProxyPass /alive/studio/api/ http://127.0.0.1:8643/api/
    ProxyPassReverse /alive/studio/api/ http://127.0.0.1:8643/api/

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/stinkindigger.info/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/stinkindigger.info/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
